<!doctype html>
<html lang="ja"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>顧客サポート — LINE bot デモ</title>
<style>
  :root{ --line:#06C755; --bg:#8aa6c2; --bot:#fff; --me:#06C755; }
  *{box-sizing:border-box;margin:0;padding:0;font-family:-apple-system,"Hiragino Sans","Hiragino Kaku Gothic ProN",Meiryo,sans-serif}
  body{background:#1f2933;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;gap:26px;flex-wrap:wrap}
  .intro{color:#cbd5e1;max-width:290px}
  .intro h1{color:#fff;font-size:19px;margin-bottom:12px}
  .intro p{font-size:13px;line-height:1.7;margin-bottom:10px}
  .intro code{background:#0b0f14;padding:1px 5px;border-radius:4px;font-size:12px}
  .intro .tag{display:inline-block;background:#06C755;color:#04331a;font-weight:700;font-size:11px;padding:3px 9px;border-radius:20px;margin-bottom:14px}
  .intro ul{font-size:12.5px;line-height:1.7;padding-left:18px;opacity:.85}
  .phone{width:392px;max-width:94vw;height:788px;background:var(--bg);border-radius:38px;border:11px solid #0b0f14;box-shadow:0 30px 80px rgba(0,0,0,.5);display:flex;flex-direction:column;overflow:hidden;position:relative}
  .hd{background:var(--line);color:#fff;padding:14px 16px;display:flex;align-items:center;gap:11px;flex-shrink:0}
  .hd .av{width:34px;height:34px;border-radius:50%;background:#fff;color:var(--line);font-weight:800;display:flex;align-items:center;justify-content:center;font-size:15px}
  .hd .nm{font-weight:700;font-size:15px}.hd .nm small{display:block;font-weight:400;font-size:11px;opacity:.85}
  .chat{flex:1;overflow-y:auto;padding:16px 12px 8px;display:flex;flex-direction:column;gap:9px;scroll-behavior:smooth}
  .row{display:flex;gap:8px;align-items:flex-end;max-width:90%}
  .row.me{align-self:flex-end;flex-direction:row-reverse}
  .av2{width:30px;height:30px;border-radius:50%;background:var(--line);color:#fff;font-weight:800;font-size:13px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
  .bub{padding:9px 12px;border-radius:16px;font-size:13.5px;line-height:1.6;white-space:pre-wrap;word-break:break-word;box-shadow:0 1px 1px rgba(0,0,0,.08)}
  .bot .bub{background:var(--bot);color:#1a1a1a;border-top-left-radius:4px}
  .me .bub{background:var(--me);color:#fff;border-top-right-radius:4px}
  .sys{align-self:center;background:rgba(0,0,0,.28);color:#fff;font-size:11px;padding:4px 12px;border-radius:20px;margin:4px 0;text-align:center}
  .chips{display:flex;flex-wrap:wrap;gap:6px;padding:2px 4px 6px 46px}
  .chip{background:#fff;color:var(--line);border:1px solid var(--line);font-size:12px;padding:6px 13px;border-radius:20px;cursor:pointer;font-weight:600}
  .chip:hover{background:var(--line);color:#fff}
  .chip.upload{background:#F2B705;border-color:#F2B705;color:#1f1f1f}
  .chip.dead{opacity:.4;cursor:default}
  .typing .bub{display:flex;gap:4px}.dot{width:6px;height:6px;border-radius:50%;background:#aaa;animation:b 1s infinite}
  .dot:nth-child(2){animation-delay:.15s}.dot:nth-child(3){animation-delay:.3s}
  @keyframes b{0%,60%,100%{opacity:.3}30%{opacity:1}}
  .inbar{flex-shrink:0;display:flex;gap:8px;padding:8px 10px;background:#f4f4f4;border-top:1px solid #e3e3e3}
  .inbar input{flex:1;border:1px solid #ccc;border-radius:18px;padding:8px 14px;font-size:13px;outline:none}
  .inbar button{background:var(--line);color:#fff;border:none;border-radius:18px;padding:0 16px;font-weight:700;cursor:pointer;font-size:13px}
  .menu{flex-shrink:0;background:#fff;border-top:1px solid #e3e3e3;display:grid;grid-template-columns:repeat(4,1fr);height:60px}
  .menu div{display:flex;align-items:center;justify-content:center;font-size:11px;text-align:center;border-right:1px solid #eee;color:#333;padding:4px;cursor:pointer}
  .menu div:hover{background:#f3f3f3}
  .menu div:last-child{border-right:none;background:#F2B705;color:#1f1f1f;font-weight:700}
  .tools{position:absolute;top:62px;right:10px;display:flex;flex-direction:column;gap:6px;z-index:5}
  .tools button{background:#1f2933;color:#fff;border:none;border-radius:16px;padding:6px 11px;font-size:11px;cursor:pointer;box-shadow:0 4px 14px rgba(0,0,0,.35)}
</style></head>
<body>
<div class="intro">
  <span class="tag">FREE ROAM · LIVE FROM YOUR CODE</span>
  <h1>顧客サポート — 自由操作デモ</h1>
  <p>全ボタン・チップ・入力欄が有効。応答は実際の bot ハンドラ（<code>app/handlers</code>）の出力です。</p>
  <ul>
    <li>FAQ / 書類提出（✅が貯まる）/ お支払い・領収書・お支払い方法</li>
    <li>物件を探す（リード診断）/ 来店・相談予約</li>
    <li>テキスト入力 → 意図判定、未該当は <b>AI回答</b></li>
    <li>右上 🌐 多言語切替 / 🔔 支払いリマインダー</li>
  </ul>
</div>
<div class="phone">
  <div class="hd"><div class="av">顧</div><div class="nm">顧客サポート<small>Exceed Real Estate</small></div></div>
  <div class="tools">
    <button id="btnLang">🌐 言語</button>
    <button id="btnRemind">🔔 リマインダー</button>
    <button id="btnReset">↻ リセット</button>
  </div>
  <div class="chat" id="chat"></div>
  <div class="inbar"><input id="inp" placeholder="メッセージを入力（例：支払い / 物件 / ビザは？）"><button id="send">送信</button></div>
  <div class="menu" id="menu"></div>
</div>
<script>
const CFG = {"responses": {"welcome": [{"text": "Exceed Real Estate 公式アカウントへようこそ。\nドバイ不動産のご購入とお手続きをサポートいたします。\n\n下のメニュー、またはメッセージから以下がご利用いただけます：\n・書類のご提出\n・お支払い状況の確認\n・よくある質問\n・担当者へのお問い合わせ", "quick": ["よくある質問", "書類を提出", "お支払い状況", "担当者と話す", "物件を探す", "来店・相談予約"]}], "faq": [{"text": "よくあるご質問：\n\n■ 営業時間\n日〜木 9:00–18:00（ドバイ時間）\n\n■ ご購入の流れ\nお申込み → 書類提出（KYC） → 売買契約 → お支払いプラン開始\n\n■ お支払いプラン\n物件により分割（建設進捗連動）です。詳細は担当者がご案内します。\n\nその他のご質問は「担当者と話す」をお選びください。", "quick": ["よくある質問", "書類を提出", "お支払い状況", "担当者と話す", "物件を探す", "来店・相談予約"]}], "documents": [{"text": "ご購入手続きには以下の書類が必要です。\n下のボタンから種類を選び、画像またはPDFを送信してください。", "quick": ["パスポート", "住所証明", "資金証明（残高証明）", "署名済み購入契約書"]}], "payments": [{"text": "ORLA by Omniyat のお支払い予定：\n・着手金 20%：AED 600,000（期日 2026-01-15）✅ 入金済み\n・中間金 30%：AED 900,000（期日 2026-07-01）未入金\n・引渡金 50%：AED 1,500,000（期日 2027-03-01）未入金\n\nお支払い済み：AED 600,000\n残額：AED 2,400,000\n次回お支払い：中間金 30% AED 900,000（2026-07-01）", "quick": ["お支払い方法", "領収書を送信", "担当者と話す"]}], "contact": [{"text": "担当者におつなぎします。営業時間内に順次ご返信いたします。\nお急ぎの場合は、ご用件を続けてご記入ください。", "quick": ["よくある質問", "書類を提出", "お支払い状況", "担当者と話す", "物件を探す", "来店・相談予約"]}], "ai": [{"text": "ドバイ不動産のご購入は、①お申込み → ②書類提出（KYC） → ③売買契約 → ④お支払いプラン開始、という流れです。お支払いは物件により建設進捗連動の分割が一般的です。詳しい条件は担当者がご案内します。（※デモ用のAI回答例です）", "quick": ["よくある質問", "書類を提出", "お支払い状況", "担当者と話す", "物件を探す", "来店・相談予約"]}]}, "awaiting": {"passport": "「パスポート」の画像またはPDFを送信してください。", "address": "「住所証明」の画像またはPDFを送信してください。", "funds": "「資金証明（残高証明）」の画像またはPDFを送信してください。", "contract": "「署名済み購入契約書」の画像またはPDFを送信してください。"}, "reminder": [{"text": "【お支払いのご案内】\nORLA by Omniyat\n中間金 30%\n金額：AED 900,000\nお支払い期日：2026-07-01\n\nご入金がお済みの場合は行き違いをご容赦ください。ご不明点は担当者まで。", "quick": []}], "lead": {"steps": [{"text": "ご予算の目安をお選びください。", "quick": ["≤1M AED", "1–3M AED", "3–5M AED", "5M+ AED"]}, {"text": "ご希望のエリアをお選びください。", "quick": ["Downtown", "Dubai Marina", "Palm Jumeirah", "Business Bay", "その他"]}, {"text": "ご購入のご予定時期はいかがですか？", "quick": ["今すぐ", "3ヶ月以内", "6ヶ月以上", "検討中"]}], "done": {"text": "ありがとうございます。条件に合うおすすめ物件をご用意し、担当者より優先的にご連絡いたします。", "quick": ["よくある質問", "書類を提出", "お支払い状況", "担当者と話す", "物件を探す", "来店・相談予約"]}}, "booking": {"steps": [{"text": "ご希望の対応をお選びください。", "quick": ["内見", "オンライン相談"]}, {"text": "ご希望のお時間帯をお選びください。", "quick": ["午前", "午後", "夕方"]}], "done": {"text": "ご希望を承りました（Viewing・Afternoon）。担当者より日程調整のご連絡をいたします。", "quick": ["よくある質問", "書類を提出", "お支払い状況", "担当者と話す", "物件を探す", "来店・相談予約"]}}, "pay_now": [{"text": "お支払い方法（お振込）：\n金額：AED 900,000\nお振込先：[FILL IN: Exceed beneficiary — bank / IBAN / SWIFT]\n参照番号 EXC-DEMOUS をご依頼人欄にご記入ください。\nお振込後、「領収書を送信」より明細をお送りください。", "quick": []}], "receiptAwaiting": "お振込明細（領収書）の画像またはPDFを送信してください。", "receiptReceived": "領収書を受け取りました。確認のうえ、お支払い状況に反映いたします。", "welcomeLangs": {"ja": "Exceed Real Estate 公式アカウントへようこそ。\nドバイ不動産のご購入とお手続きをサポートいたします。\n\n下のメニュー、またはメッセージから以下がご利用いただけます：\n・書類のご提出\n・お支払い状況の確認\n・よくある質問\n・担当者へのお問い合わせ", "en": "Welcome to the Exceed Real Estate official account.\nWe support your Dubai property purchase end to end.\n\nUse the menu below or message us to:\n• Submit documents\n• Check payment status\n• Read FAQs\n• Talk to an agent", "ar": "مرحبًا بك في الحساب الرسمي لـ Exceed Real Estate.\nنرافقك في شراء عقارك في دبي وإنجاز الإجراءات.\n\nمن القائمة بالأسفل أو عبر الرسائل يمكنك:\n• تقديم المستندات\n• متابعة حالة الدفعات\n• الأسئلة الشائعة\n• التواصل مع موظف", "zh": "欢迎关注 Exceed Real Estate 官方账号。\n我们将全程协助您在迪拜的房产购买与手续办理。\n\n您可通过下方菜单或直接发送消息：\n・提交文件\n・查询付款状态\n・常见问题\n・联系专员"}, "langNames": {"ja": "日本語", "en": "English", "ar": "العربية", "zh": "中文"}, "doc": {"order": ["passport", "address", "funds", "contract"], "labels": {"passport": "パスポート", "address": "住所証明", "funds": "資金証明（残高証明）", "contract": "署名済み購入契約書"}, "received": "「{doc}」を受け取りました。ありがとうございます。", "statusHeader": "現在の提出状況：", "complete": "すべての書類をご提出いただきました。担当者が確認のうえご連絡します。", "rejected": "「{doc}」を受け取れませんでした：{reason}\nお手数ですが、鮮明な画像またはPDFをもう一度お送りください。", "markDone": "✅", "markTodo": "⬜️"}, "btns": {"pay_now": "お支払い方法", "receipt": "領収書を送信", "enquiry": "物件を探す", "booking": "来店・相談予約"}, "intents": {"faq": ["faq", "よくある", "質問"], "documents": ["書類", "ドキュメント", "提出", "document", "upload", "kyc"], "payments": ["支払", "入金", "payment", "pay", "請求"], "contact": ["担当", "問い合わせ", "相談", "agent", "human", "talk", "contact"], "enquiry": ["物件", "購入を検討", "探して", "interested", "looking", "enquiry", "inquiry", "purchase"], "booking": ["予約", "内見", "見学", "viewing", "appointment", "booking", "schedule", "visit"]}, "labels": {"faq": "よくある質問", "documents": "書類を提出", "payments": "お支払い状況", "contact": "担当者と話す"}};
const chat = document.getElementById('chat');
const submitted = new Set();
let busy = false;
let langs = ['ja','en','ar','zh'], li = 0;

const labelToMenu = {};
for(const k of ['faq','documents','payments','contact']) labelToMenu[CFG.labels[k]] = k;
const labelToDoc = {};
for(const tp of CFG.doc.order) labelToDoc[CFG.doc.labels[tp]] = tp;
const labelToAction = {};
labelToAction[CFG.btns.pay_now]='pay_now';
labelToAction[CFG.btns.receipt]='receipt';
labelToAction[CFG.btns.enquiry]='lead';
labelToAction[CFG.btns.booking]='booking';

const delay = ms => new Promise(r=>setTimeout(r,ms));
const scroll = () => chat.scrollTop = chat.scrollHeight;
function el(cls){ const d=document.createElement('div'); if(cls) d.className=cls; return d; }
function avatar(t){ const a=el('av2'); a.textContent=t; return a; }
function bubble(t){ const b=el('bub'); b.textContent=t; return b; }
function addUser(t){ const r=el('row me'); r.appendChild(avatar('客')); r.appendChild(bubble(t)); chat.appendChild(r); scroll(); }
function addSys(t){ const s=el('sys'); s.textContent=t; chat.appendChild(s); scroll(); }
function addBotText(t){ const r=el('row bot'); r.appendChild(avatar('顧')); r.appendChild(bubble(t)); chat.appendChild(r); scroll(); }
function typing(){ const r=el('row bot typing'); r.appendChild(avatar('顧')); const b=el('bub'); for(let i=0;i<3;i++) b.appendChild(el('dot')); r.appendChild(b); chat.appendChild(r); scroll(); return r; }

const menuChips = ['faq','documents','payments','contact'].map(k=>CFG.labels[k]).concat([CFG.btns.enquiry, CFG.btns.booking]);

function chipRow(labels){
  const c = el('chips');
  labels.forEach(lbl=>{
    const ch = el('chip'); ch.textContent = lbl;
    const action = labelToMenu[lbl] || (labelToDoc[lbl] ? 'pick:'+labelToDoc[lbl] : labelToAction[lbl]);
    if(action){ ch.onclick=()=>handle(action); } else { ch.className='chip dead'; }
    c.appendChild(ch);
  });
  chat.appendChild(c); scroll();
}
function addBot(msg){ addBotText(msg.text); if(msg.quick && msg.quick.length) chipRow(msg.quick); }

async function playBot(msgs){
  busy=true;
  for(const m of msgs){ const t=typing(); await delay(600); t.remove(); addBot(m); await delay(280); }
  busy=false;
}

function checklistMsg(){
  if(submitted.size === CFG.doc.order.length) return {text:CFG.doc.complete, quick:menuChips};
  const lines = CFG.doc.order.map(tp=>(submitted.has(tp)?CFG.doc.markDone:CFG.doc.markTodo)+' '+CFG.doc.labels[tp]).join('\n');
  return {text:CFG.doc.statusHeader+'\n'+lines, quick:menuChips};
}
function uploadChip(tp, label){ const c=el('chips'); const ch=el('chip upload'); ch.textContent='📎 '+label; ch.onclick=()=>handle('upload:'+tp); c.appendChild(ch); chat.appendChild(c); scroll(); }

async function runFlow(name, idx){
  const flow = CFG[name];
  const step = flow.steps[idx];
  const t=typing(); await delay(600); t.remove(); addBotText(step.text);
  const c=el('chips');
  step.quick.forEach(lbl=>{
    const ch=el('chip'); ch.textContent=lbl;
    ch.onclick=async()=>{
      if(busy) return;
      Array.from(c.children).forEach(x=>x.className='chip dead');
      addUser(lbl);
      if(idx+1 < flow.steps.length) await runFlow(name, idx+1);
      else await playBot([flow.done]);
    };
    c.appendChild(ch);
  });
  chat.appendChild(c); scroll();
}

async function handle(action){
  if(busy) return;
  if(['faq','payments','contact'].includes(action)){ addUser(CFG.labels[action]); await playBot(CFG.responses[action]); return; }
  if(action==='documents'){ addUser(CFG.labels.documents); await playBot(CFG.responses.documents); return; }
  if(action==='lead'){ addUser(CFG.btns.enquiry); await runFlow('lead', 0); return; }
  if(action==='booking'){ addUser(CFG.btns.booking); await runFlow('booking', 0); return; }
  if(action==='pay_now'){ addUser(CFG.btns.pay_now); await playBot(CFG.pay_now); return; }
  if(action==='receipt'){ addUser(CFG.btns.receipt); await playBot([{text:CFG.receiptAwaiting, quick:[]}]); uploadChip('receipt','receipt.pdf'); return; }
  if(action==='upload:receipt'){ addUser('📎 receipt.pdf'); await playBot([{text:CFG.receiptReceived, quick:menuChips}]); return; }
  if(action.startsWith('pick:')){
    const tp=action.slice(5); addUser(CFG.doc.labels[tp]);
    await playBot([{text:CFG.awaiting[tp], quick:[]}]); uploadChip(tp, CFG.doc.labels[tp]+'.jpg'); return;
  }
  if(action.startsWith('upload:')){
    const tp=action.slice(7); addUser('📎 '+tp+'.jpg'); submitted.add(tp);
    await playBot([{text:CFG.doc.received.replace('{doc}',CFG.doc.labels[tp]), quick:[]}, checklistMsg()]); return;
  }
}

function intentOf(text){
  const low=text.toLowerCase();
  for(const intent in CFG.intents){ if(CFG.intents[intent].some(kw=>low.includes(kw.toLowerCase()))) return intent; }
  return null;
}
async function sendText(){
  const inp=document.getElementById('inp'); const txt=inp.value.trim(); if(!txt||busy) return;
  inp.value=''; addUser(txt);
  const intent=intentOf(txt);
  if(intent==='enquiry'){ await runFlow('lead',0); }
  else if(intent==='booking'){ await runFlow('booking',0); }
  else if(intent){ await playBot(CFG.responses[intent]); }
  else { await playBot(CFG.responses.ai); }   // AI Q&A handles the unmatched long tail
}

function buildMenu(){
  const menu=document.getElementById('menu');
  const items=[['faq','よくある\n質問'],['documents','書類を\n提出'],['payments','お支払い\n状況'],['contact','担当者と\n話す']];
  items.forEach(([action,lbl])=>{ const d=el(); lbl.split('\n').forEach((line,i)=>{ if(i) d.appendChild(document.createElement('br')); d.appendChild(document.createTextNode(line)); }); d.onclick=()=>handle(action); menu.appendChild(d); });
}

async function reset(){ while(chat.firstChild) chat.removeChild(chat.firstChild); submitted.clear(); li=0; await playBot(CFG.responses.welcome); }

document.getElementById('send').onclick=sendText;
document.getElementById('inp').addEventListener('keydown',e=>{ if(e.key==='Enter') sendText(); });
document.getElementById('btnReset').onclick=reset;
document.getElementById('btnRemind').onclick=async()=>{ if(busy) return; addSys('自動送信：お支払い7日前リマインダー'); await playBot(CFG.reminder); };
document.getElementById('btnLang').onclick=async()=>{ if(busy) return; li=(li+1)%langs.length; const L=langs[li]; addSys('🌐 '+CFG.langNames[L]); await playBot([{text:CFG.welcomeLangs[L], quick:[]}]); };

buildMenu();
reset();
</script>
</body></html>
